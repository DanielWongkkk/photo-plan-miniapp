<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拍照策划 - 设计稿预览</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --brand-primary: #FF6B35;
      --brand-gradient: linear-gradient(135deg, #FF6B35 0%, #FF8F5A 100%);
      --gray-900: #1A1A2E;
      --gray-700: #4A4A68;
      --gray-500: #7A7A8C;
      --gray-300: #B0B0C0;
      --gray-100: #F0F0F5;
      --gray-50: #F8F8FA;
      --white: #FFFFFF;
      --font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-family);
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      padding: 48px 24px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    
    .logo {
      width: 64px;
      height: 64px;
      background: var(--brand-gradient);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(255, 107, 53, 0.3);
    }
    
    .logo svg {
      width: 32px;
      height: 32px;
      color: white;
    }
    
    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .subtitle {
      font-size: 16px;
      color: var(--gray-500);
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    
    .card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
    }
    
    .card-preview {
      aspect-ratio: 9/16;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.05) 0%, rgba(255, 143, 90, 0.02) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--gray-100);
      position: relative;
      overflow: hidden;
    }
    
    .card-preview::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(0, 0, 0, 0.02) 10px,
        rgba(0, 0, 0, 0.02) 20px
      );
    }
    
    .card-preview svg {
      width: 48px;
      height: 48px;
      color: var(--gray-300);
      position: relative;
      z-index: 1;
    }
    
    .card-content {
      padding: 20px;
    }
    
    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .card-desc {
      font-size: 14px;
      color: var(--gray-500);
      line-height: 1.6;
    }
    
    .card-tag {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      background: rgba(255, 107, 53, 0.1);
      color: var(--brand-primary);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-100);
      color: var(--gray-500);
      font-size: 14px;
    }
    
    .footer a {
      color: var(--brand-primary);
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    @media (max-width: 640px) {
      body {
        padding: 24px 16px;
      }
      
      .title {
        font-size: 24px;
      }
      
      .grid {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h1 class="title">拍照策划 · 设计稿</h1>
      <p class="subtitle">点击卡片预览页面设计</p>
    </div>
    
    <div class="grid">
      <a href="login.html" class="card">
        <div class="card-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="card-content">
          <h3 class="card-title">登录页</h3>
          <p class="card-desc">微信登录入口，支持头像昵称填写，符合微信小程序新规范</p>
          <span class="card-tag">用户入口</span>
        </div>
      </a>
      
      <a href="home.html" class="card">
        <div class="card-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="card-content">
          <h3 class="card-title">首页（输入页）</h3>
          <p class="card-desc">拍摄主题、地点、时间、设备等输入表单，支持快速选择和自定义</p>
          <span class="card-tag">核心页面</span>
        </div>
      </a>
      
      <a href="loading.html" class="card">
        <div class="card-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div class="card-content">
          <h3 class="card-title">加载页</h3>
          <p class="card-desc">AI 生成进度展示，带步骤提示和进度条动画</p>
          <span class="card-tag">过渡页面</span>
        </div>
      </a>
      
      <a href="result.html" class="card">
        <div class="card-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
        </div>
        <div class="card-content">
          <h3 class="card-title">策划结果页</h3>
          <p class="card-desc">完整的拍摄策划展示，包含参数配置、取景点、拍摄清单、样片参考</p>
          <span class="card-tag">核心页面</span>
        </div>
      </a>
      
      <a href="profile.html" class="card">
        <div class="card-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <div class="card-content">
          <h3 class="card-title">个人中心</h3>
          <p class="card-desc">用户信息、设备管理、历史策划、设置等个人功能入口</p>
          <span class="card-tag">个人页面</span>
        </div>
      </a>
    </div>
    
    <div class="footer">
      <p>设计稿基于 <a href="../DESIGN.md">DESIGN.md 设计规范</a> · 适配移动端 375px - 428px</p>
      <p style="margin-top: 8px;">建议使用 Chrome 开发者工具模拟手机预览</p>
    </div>
  </div>
</body>
</html>
