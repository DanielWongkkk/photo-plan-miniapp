<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>拍照策划 - 登录</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ==================== CSS Variables ==================== */
    :root {
      /* Brand Colors - Warm Photography Theme */
      --brand-primary: #FF6B35;
      --brand-primary-light: #FF8F5A;
      --brand-primary-dark: #E55A28;
      --brand-gradient: linear-gradient(135deg, #FF6B35 0%, #FF8F5A 100%);
      
      /* Accent Colors */
      --accent-gold: #FFB347;
      --accent-teal: #2EC4B6;
      --accent-coral: #FF6B6B;
      
      /* Neutral Colors */
      --gray-900: #1A1A2E;
      --gray-700: #4A4A68;
      --gray-500: #7A7A8C;
      --gray-300: #B0B0C0;
      --gray-100: #F5F5F7;
      --gray-50: #FAFAFA;
      --white: #FFFFFF;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
      --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.16);
      --shadow-brand: 0 8px 24px rgba(255, 107, 53, 0.3);
      
      /* Typography */
      --font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      
      /* Spacing */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-2xl: 48px;
      
      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      
      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 400ms ease;
    }
    
    /* ==================== Reset & Base ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      font-family: var(--font-family);
      font-size: 16px;
      line-height: 1.5;
      color: var(--gray-900);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* ==================== Page Container ==================== */
    .page-container {
      min-height: 100vh;
      min-height: 100dvh; /* Dynamic viewport height for mobile */
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #FFF9F5 0%, #FFFFFF 100%);
      position: relative;
      overflow: hidden;
    }
    
    /* Decorative Background Elements */
    .bg-decoration {
      position: absolute;
      pointer-events: none;
    }
    
    .bg-circle-1 {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 107, 53, 0.08) 0%, transparent 70%);
      top: -100px;
      right: -80px;
      animation: float 8s ease-in-out infinite;
    }
    
    .bg-circle-2 {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 179, 71, 0.1) 0%, transparent 70%);
      bottom: 20%;
      left: -60px;
      animation: float 10s ease-in-out infinite reverse;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }
    
    /* ==================== Content Area ==================== */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--spacing-xl) var(--spacing-lg);
      position: relative;
      z-index: 1;
    }
    
    /* ==================== Brand Section ==================== */
    .brand-section {
      text-align: center;
      margin-bottom: var(--spacing-2xl);
      animation: fadeInUp 0.6s ease-out;
    }
    
    .brand-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto var(--spacing-lg);
      background: var(--brand-gradient);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-brand);
      position: relative;
      overflow: hidden;
    }
    
    .brand-logo::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 2s infinite;
    }
    
    @keyframes shimmer {
      100% { left: 100%; }
    }
    
    .brand-logo svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    
    .brand-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--gray-900);
      letter-spacing: -0.5px;
      margin-bottom: var(--spacing-sm);
    }
    
    .brand-tagline {
      font-size: 15px;
      color: var(--gray-500);
      font-weight: 400;
    }
    
    /* ==================== Login Card ==================== */
    .login-card {
      width: 100%;
      max-width: 340px;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* WeChat Login Button */
    .btn-wechat {
      width: 100%;
      height: 52px;
      background: #07C160;
      color: white;
      border: none;
      border-radius: var(--radius-xl);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      transition: all var(--transition-normal);
      box-shadow: 0 4px 16px rgba(7, 193, 96, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    .btn-wechat:hover {
      background: #06AD56;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(7, 193, 96, 0.4);
    }
    
    .btn-wechat:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(7, 193, 96, 0.3);
    }
    
    .btn-wechat svg {
      width: 22px;
      height: 22px;
    }
    
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: var(--spacing-lg) 0;
      color: var(--gray-300);
      font-size: 13px;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-100);
    }
    
    .divider span {
      padding: 0 var(--spacing-md);
    }
    
    /* Avatar Upload Section */
    .avatar-section {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }
    
    .avatar-upload {
      width: 72px;
      height: 72px;
      margin: 0 auto var(--spacing-sm);
      border-radius: 50%;
      background: var(--gray-100);
      border: 2px dashed var(--gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-normal);
      position: relative;
      overflow: hidden;
    }
    
    .avatar-upload:hover {
      border-color: var(--brand-primary);
      background: #FFF5F0;
    }
    
    .avatar-upload svg {
      width: 28px;
      height: 28px;
      color: var(--gray-500);
      transition: color var(--transition-fast);
    }
    
    .avatar-upload:hover svg {
      color: var(--brand-primary);
    }
    
    .avatar-upload.has-image {
      border-style: solid;
      border-color: var(--brand-primary);
    }
    
    .avatar-upload img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .avatar-hint {
      font-size: 13px;
      color: var(--gray-500);
    }
    
    /* Nickname Input */
    .input-group {
      margin-bottom: var(--spacing-md);
    }
    
    .input-field {
      width: 100%;
      height: 52px;
      background: var(--gray-50);
      border: 1.5px solid transparent;
      border-radius: var(--radius-lg);
      padding: 0 var(--spacing-lg);
      font-size: 16px;
      font-family: var(--font-family);
      color: var(--gray-900);
      transition: all var(--transition-fast);
    }
    
    .input-field::placeholder {
      color: var(--gray-300);
    }
    
    .input-field:focus {
      outline: none;
      background: var(--white);
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
    }
    
    /* Submit Button */
    .btn-submit {
      width: 100%;
      height: 52px;
      background: var(--brand-gradient);
      color: white;
      border: none;
      border-radius: var(--radius-xl);
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font-family);
      cursor: pointer;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-brand);
      margin-top: var(--spacing-md);
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(255, 107, 53, 0.35);
    }
    
    .btn-submit:active {
      transform: translateY(0);
    }
    
    .btn-submit:disabled {
      background: var(--gray-300);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    
    /* ==================== Footer ==================== */
    .footer {
      text-align: center;
      padding: var(--spacing-lg);
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    
    .footer-text {
      font-size: 12px;
      color: var(--gray-500);
    }
    
    .footer-link {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 500;
    }
    
    .footer-link:hover {
      text-decoration: underline;
    }
    
    /* ==================== Toast ==================== */
    .toast {
      position: fixed;
      top: var(--spacing-xl);
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--gray-900);
      color: white;
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: all var(--transition-normal);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    .toast svg {
      width: 18px;
      height: 18px;
    }
    
    /* ==================== Responsive ==================== */
    @media (max-width: 375px) {
      .brand-logo {
        width: 64px;
        height: 64px;
      }
      
      .brand-name {
        font-size: 24px;
      }
      
      .login-card {
        max-width: 100%;
      }
    }
    
    @media (min-width: 768px) {
      .page-container {
        justify-content: center;
        align-items: center;
      }
      
      .content {
        max-width: 400px;
      }
    }
    
    /* ==================== Animations ==================== */
    @media (prefers-reduced-motion: no-preference) {
      .brand-section,
      .login-card,
      .footer {
        animation: fadeInUp 0.6s ease-out;
      }
      
      .login-card {
        animation-delay: 0.1s;
      }
      
      .footer {
        animation-delay: 0.2s;
      }
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- Decorative Background -->
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    
    <!-- Main Content -->
    <div class="content">
      <!-- Brand Section -->
      <div class="brand-section">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <h1 class="brand-name">拍照策划</h1>
        <p class="brand-tagline">一键生成专业拍照策划</p>
      </div>
      
      <!-- Login Card -->
      <div class="login-card">
        <!-- WeChat Login Button -->
        <button class="btn-wechat" onclick="handleWechatLogin()">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.046c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.269-.03-.407-.032zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
          </svg>
          微信一键登录
        </button>
        
        <!-- Divider -->
        <div class="divider">
          <span>或使用手机号</span>
        </div>
        
        <!-- Avatar Upload -->
        <div class="avatar-section">
          <div class="avatar-upload" id="avatarUpload" onclick="document.getElementById('avatarInput').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="avatarIcon">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <img id="avatarPreview" style="display: none;" alt="用户头像">
          </div>
          <p class="avatar-hint">点击选择头像</p>
          <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="handleAvatarChange(event)">
        </div>
        
        <!-- Nickname Input -->
        <div class="input-group">
          <input type="text" class="input-field" id="nickname" placeholder="请输入昵称" maxlength="12">
        </div>
        
        <!-- Submit Button -->
        <button class="btn-submit" id="submitBtn" onclick="handleSubmit()" disabled>
          完成登录
        </button>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <p class="footer-text">
        登录即表示同意
        <a href="#" class="footer-link">《用户协议》</a>
        和
        <a href="#" class="footer-link">《隐私政策》</a>
      </p>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="toastText">操作成功</span>
    </div>
  </div>
  
  <script>
    // Avatar Upload Handler
    function handleAvatarChange(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const preview = document.getElementById('avatarPreview');
          const icon = document.getElementById('avatarIcon');
          const upload = document.getElementById('avatarUpload');
          
          preview.src = e.target.result;
          preview.style.display = 'block';
          icon.style.display = 'none';
          upload.classList.add('has-image');
          
          validateForm();
        };
        reader.readAsDataURL(file);
      }
    }
    
    // Form Validation
    function validateForm() {
      const nickname = document.getElementById('nickname').value.trim();
      const avatarPreview = document.getElementById('avatarPreview');
      const submitBtn = document.getElementById('submitBtn');
      
      const isValid = nickname.length >= 2 && avatarPreview.style.display === 'block';
      submitBtn.disabled = !isValid;
    }
    
    // Nickname Input Handler
    document.getElementById('nickname').addEventListener('input', validateForm);
    
    // WeChat Login Handler
    function handleWechatLogin() {
      showToast('正在跳转微信授权...');
      // In real app, this would call wx.login()
    }
    
    // Submit Handler
    function handleSubmit() {
      const nickname = document.getElementById('nickname').value.trim();
      showToast('登录成功！');
      
      // In real app, this would send to backend
      setTimeout(() => {
        // Redirect to home page
        console.log('Redirect to home');
      }, 1000);
    }
    
    // Toast Helper
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      
      toastText.textContent = message;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
